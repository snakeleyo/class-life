<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>平行世界教室 - Class Life</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=M+PLUS+Rounded+1c:wght@400;700&family=DotGothic16&display=swap" rel="stylesheet">
    <style>
        :root {
            /* 主色调 - 日系清新 */
            --bg-primary: #FDF8F3;
            --bg-secondary: #F5EFE6;
            --bg-card: #FFFFFF;
            --accent-green: #A8D5BA;
            --accent-pink: #FFB7C5;
            --accent-yellow: #FFE5B4;
            --accent-blue: #A8D4E6;
            --text-primary: #4A403A;
            --text-secondary: #8B7E74;
            --text-muted: #B8AFA4;
            --shadow-soft: rgba(74, 64, 58, 0.08);
            --shadow-medium: rgba(74, 64, 58, 0.12);
            --border-light: #E8E0D8;
            
            /* 角色状态色 */
            --status-focus: #7CB97C;
            --status-dozing: #E6A8C5;
            --status-daydream: #C5B8E6;
            --status-active: #7CB9E6;
            
            /* 圆角 */
            --radius-sm: 8px;
            --radius-md: 16px;
            --radius-lg: 24px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Noto Sans JP', 'M PLUS Rounded 1c', sans-serif;
            background: var(--bg-secondary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        /* 页面容器 */
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* 顶部栏 */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: 0 4px 20px var(--shadow-soft);
            margin-bottom: 20px;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-green), var(--accent-pink));
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .logo-text {
            font-size: 18px;
            font-weight: 700;
            letter-spacing: 2px;
        }

        .time-display {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .current-time {
            font-family: 'DotGothic16', monospace;
            font-size: 28px;
            color: var(--text-primary);
        }

        .current-date {
            font-size: 14px;
            color: var(--text-secondary);
            text-align: right;
        }

        /* 课程信息卡 */
        .classroom-info {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        /* 黑板区域 */
        .blackboard {
            background: linear-gradient(180deg, #4A5548 0%, #3D4A3C 100%);
            border-radius: var(--radius-lg);
            padding: 30px;
            min-height: 200px;
            position: relative;
            box-shadow: 
                inset 0 2px 4px rgba(0,0,0,0.2),
                0 8px 32px var(--shadow-medium);
        }

        .blackboard::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: repeating-linear-gradient(
                0deg,
                transparent,
                transparent 2px,
                rgba(255,255,255,0.03) 2px,
                rgba(255,255,255,0.03) 4px
            );
            pointer-events: none;
        }

        .chalk-title {
            color: #F5F5DC;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 8px;
            opacity: 0.8;
        }

        .chalk-content {
            color: #F5F5DC;
            font-size: 32px;
            font-weight: 700;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
            margin-bottom: 16px;
        }

        .chalk-teacher {
            color: #C8E6C8;
            font-size: 16px;
            opacity: 0.9;
        }

        .chalk-frame {
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 80%;
            height: 20px;
            background: linear-gradient(180deg, #8B6914 0%, #6B4D0F 100%);
            border-radius: 0 0 8px 8px;
        }

        /* 课程表 */
        .schedule-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 24px;
            box-shadow: 0 4px 20px var(--shadow-soft);
        }

        .schedule-title {
            font-size: 14px;
            font-weight: 700;
            color: var(--text-secondary);
            margin-bottom: 16px;
            letter-spacing: 1px;
        }

        .schedule-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .schedule-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 16px;
            border-radius: var(--radius-sm);
            transition: all 0.2s ease;
        }

        .schedule-item.current {
            background: linear-gradient(90deg, var(--accent-green) 0%, rgba(168, 213, 186, 0.5) 100%);
        }

        .schedule-item.past {
            opacity: 0.5;
        }

        .schedule-time {
            font-family: 'DotGothic16', monospace;
            font-size: 14px;
            color: var(--text-secondary);
            min-width: 50px;
        }

        .schedule-item.current .schedule-time {
            color: var(--text-primary);
            font-weight: 700;
        }

        .schedule-name {
            font-size: 14px;
            color: var(--text-primary);
        }

        /* 教室主体 */
        .classroom-main {
            flex: 1;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            padding: 30px;
            box-shadow: 0 4px 20px var(--shadow-soft);
            position: relative;
            overflow: hidden;
        }

        /* 教室装饰 */
        .classroom-decoration {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: linear-gradient(180deg, var(--bg-secondary) 0%, transparent 100%);
            pointer-events: none;
        }

        .wall-pattern {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 40px;
            opacity: 0.3;
        }

        .wall-dot {
            width: 8px;
            height: 8px;
            background: var(--text-muted);
            border-radius: 50%;
        }

        /* 讲台 */
        .podium {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 30px;
            background: linear-gradient(180deg, #8B6914 0%, #6B4D0F 100%);
            border-radius: var(--radius-sm);
            box-shadow: 0 4px 12px var(--shadow-medium);
        }

        .podium::before {
            content: '';
            position: absolute;
            top: -15px;
            left: 50%;
            transform: translateX(-50%);
            width: 160px;
            height: 20px;
            background: #5D4A0F;
            border-radius: var(--radius-sm) var(--radius-sm) 0 0;
        }

        /* 座位网格 */
        .seats-grid {
            display: grid;
            grid-template-columns: repeat(6, 1fr);
            gap: 20px;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .seat {
            aspect-ratio: 1;
            background: var(--bg-secondary);
            border-radius: var(--radius-md);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            border: 2px solid transparent;
        }

        .seat:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px var(--shadow-medium);
            border-color: var(--accent-green);
        }

        .seat.empty {
            opacity: 0.4;
            cursor: default;
        }

        .seat.empty:hover {
            transform: none;
            box-shadow: none;
            border-color: transparent;
        }

        /* 角色 */
        .character {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            position: relative;
            box-shadow: 0 2px 8px var(--shadow-soft);
        }

        .avatar.boy {
            background: linear-gradient(135deg, #A8D4E6 0%, #7CB9E6 100%);
        }

        .avatar.girl {
            background: linear-gradient(135deg, #FFB7C5 0%, #F5A8B8 100%);
        }

        /* 状态指示器 */
        .status-indicator {
            position: absolute;
            bottom: -2px;
            right: -2px;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 2px solid var(--bg-card);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 8px;
        }

        .status-indicator.focus { background: var(--status-focus); }
        .status-indicator.dozing { background: var(--status-dozing); }
        .status-indicator.daydream { background: var(--status-daydream); }
        .status-indicator.active { background: var(--status-active); }

        .character-name {
            font-size: 12px;
            font-weight: 500;
            color: var(--text-primary);
            text-align: center;
            max-width: 70px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* 状态气泡 */
        .status-bubble {
            position: absolute;
            top: -8px;
            background: var(--bg-card);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 10px;
            box-shadow: 0 2px 8px var(--shadow-soft);
            white-space: nowrap;
            opacity: 0;
            transform: translateY(4px);
            transition: all 0.2s ease;
        }

        .seat:hover .status-bubble {
            opacity: 1;
            transform: translateY(0);
        }

        /* ZZZ 动画 */
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-4px); }
        }

        .zzz {
            position: absolute;
            top: 0;
            right: 0;
            font-family: 'DotGothic16', monospace;
            font-size: 10px;
            color: var(--text-secondary);
            animation: float 1.5s ease-in-out infinite;
        }

        /* 底部信息栏 */
        .footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 24px;
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            box-shadow: 0 4px 20px var(--shadow-soft);
            margin-top: 20px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--accent-pink) 0%, var(--accent-yellow) 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .user-name {
            font-size: 14px;
            font-weight: 500;
        }

        .user-status {
            font-size: 12px;
            color: var(--text-secondary);
        }

        .class-info {
            display: flex;
            gap: 24px;
        }

        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .info-icon {
            font-size: 16px;
        }

        /* 响应式 */
        @media (max-width: 768px) {
            .classroom-info {
                grid-template-columns: 1fr;
            }

            .seats-grid {
                grid-template-columns: repeat(4, 1fr);
                gap: 12px;
            }

            .header {
                flex-direction: column;
                gap: 12px;
            }

            .class-info {
                display: none;
            }
        }
    </style>
</head>
